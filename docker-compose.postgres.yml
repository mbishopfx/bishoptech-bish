# Local Postgres for Zero upstream and Better Auth.
# Zero replication requires wal_level=logical (not the default "replica").
# Usage:
#   docker compose -f docker-compose.postgres.yml up -d
# Then set in apps/start/.env.local:
#   ZERO_UPSTREAM_DB=postgresql://bish:bish@localhost:5432/bish
# Run schema: cd apps/start && bun run db:reset

services:
  postgres:
    image: postgres:16-alpine
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_USER: bish
      POSTGRES_PASSWORD: bish
      POSTGRES_DB: bish
    ports:
      - "5432:5432"
    volumes:
      - bish_postgres_data:/var/lib/postgresql/data

volumes:
  bish_postgres_data: {}
